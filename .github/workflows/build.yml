name: Build switch-pctltcp-sysmodule

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkita64

    steps:
    - uses: actions/checkout@v3

    - name: Build
      run: |
        make

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pctltcp-sysmodule
        path: |
          pctltcp-sysmodule.nro