name: Build switch-pctltcp-sysmodule

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          make clean
          make -j$(nproc)
          echo "=== Output files ==="
          ls -la *.nsp *.elf exefs.nsp 2>/dev/null || true

      - name: Prepare exefs.nsp
        run: |
          if [ -f pctltcp-sysmodule.nsp ]; then
            cp pctltcp-sysmodule.nsp exefs.nsp
            echo "Copied pctltcp-sysmodule.nsp -> exefs.nsp"
          fi
          ls -la exefs.nsp 2>/dev/null || echo "exefs.nsp not found!"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pctltcp-sysmodule
          path: exefs.nsp
