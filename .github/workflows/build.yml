name: Build switch-pctltcp-sysmodule

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          make clean
          make -j$(nproc)
          echo "=== Output files ==="
          ls -la *.sts *.elf 2>/dev/null || true

      - name: List output
        run: |
          echo "=== All .sts files ==="
          find . -name "*.sts" -ls 2>/dev/null || echo "No .sts files found"
          echo "=== Build dir ==="
          ls -la build/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pctltcp-sysmodule
          path: pctltcp-sysmodule.sts
          if-no-files-found: error
