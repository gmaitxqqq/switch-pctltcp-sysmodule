name: Build switch-pctltcp-sysmodule

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          make clean
          make -j$(nproc)

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pctltcp-sysmodule
          path: |
            exefs.nsp
            exefs/
