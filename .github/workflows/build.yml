name: Build switch-pctltcp-sysmodule

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ELF
        run: |
          make clean
          make -j$(nproc)

      - name: Convert ELF to NSP
        run: |
          python3 elf2nsp.py pctltcp-sysmodule.elf pctltcp-sysmodule.nsp

      - name: List output
        run: |
          echo "=== Output files ==="
          ls -la *.nsp *.elf 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pctltcp-sysmodule
          path: pctltcp-sysmodule.nsp
          if-no-files-found: error
