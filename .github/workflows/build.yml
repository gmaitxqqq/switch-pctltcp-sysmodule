name: Build switch-pctltcp-sysmodule

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          make clean
          make -j$(nproc)

      - name: Package sysmodule
        run: |
          mkdir -p release/atmosphere/contents/0100000000001000/exefs
          mkdir -p release/atmosphere/contents/0100000000001000/flags
          cp pctltcp-sysmodule.elf release/atmosphere/contents/0100000000001000/exefs/main
          touch release/atmosphere/contents/0100000000001000/flags/boot2.flag
          echo "=== Output ==="
          ls -laR release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pctltcp-sysmodule
          path: release/
          if-no-files-found: error
